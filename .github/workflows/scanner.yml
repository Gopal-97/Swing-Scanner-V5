name: Swing Scanner

on:
  schedule:
    - cron: '50 18 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug Files
        run: |
          echo "Current Directory:"
          pwd
          echo ""
          echo "Repository Files:"
          ls -la
          echo ""
          echo "telegram_v5.py:"
          cat telegram_v5.py
          echo ""
          echo "binance_api.py:"
          cat binance_api.py
          echo ""
          echo "swing_main_v5.py:"
          head -20 swing_main_v5.py

      - name: Run Scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python swing_main_v5.py
